# PLANET --- PostgreSQL settings for the containerised server.
#
# Bind-mounted at /etc/postgresql/planet.conf and pulled in by an
# `include_if_exists` line that initdb.d/00-planet-include.sh appends to
# $PGDATA/postgresql.conf. Edit + `docker compose restart db` to change these;
# no need to recreate the data volume.
#
# postgresql.auto.conf (what ALTER SYSTEM writes) is read AFTER this file, so
# the calibrated coefficients that apply-coefficients.py writes there win over
# anything set here.

# ---- PLANET ---------------------------------------------------------------
# NOTHING preloads planet here, and that is deliberate. A session that wants
# per-query carbon loads the module itself:
#
#     LOAD 'planet';  SET planet.report = on;
#
# The extension is already installed in this database and in template1, so
# planet_last() and planet_table_carbon() work without the LOAD --- they dlopen
# the module on first call. Only `SET planet.*` needs it, because the GUCs do
# not exist until the module is in the session.
#
# If you want every session to have it, uncomment:
# session_preload_libraries = 'planet'
#
# Prefer session_preload_libraries over shared_preload_libraries: the former can
# be undone with a reload, the latter needs a postmaster restart. Note that
# preloading makes it impossible to measure PLANET's own overhead against a
# hooks-absent baseline in the same cluster.

# Coefficients are NOT set here. They are calibrated (see ../calibration) and
# applied to postgresql.auto.conf by initdb.d/20-planet-coefficients.sh, or by
# `make coefficients` at any time. Absent that, the extension's built-in
# defaults apply and carbon numbers are UNCALIBRATED: usable to rank two plans
# on the same machine, not as absolute joules.

# ---- resources -------------------------------------------------------------
# Modest defaults that start on a laptop. If you are measuring anything, raise
# these to fit your host and record what you used --- the stock 128MB
# shared_buffers makes almost any workload I/O-bound, which changes the shape of
# what PLANET reports.
shared_buffers = 512MB
effective_cache_size = 2GB
work_mem = 32MB
maintenance_work_mem = 256MB

# Checkpoints are the loudest source of run-to-run variance in write-heavy work.
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_timeout = 30min
checkpoint_completion_target = 0.9

# ---- parallelism -----------------------------------------------------------
# Needs compose's `shm_size` to be large enough, or parallel workers die with
# "could not resize shared memory segment".
max_worker_processes = 16
max_parallel_workers = 12
max_parallel_workers_per_gather = 4

# ---- observability ---------------------------------------------------------
# blk_read_time / blk_write_time are the only way to tell a shared_blks_read
# that came off the device from one the OS page cache served. PLANET's
# joules_per_read cannot distinguish them.
track_io_timing = on

# ---- per-machine overrides -------------------------------------------------
# Read last, so it wins over everything above (postgresql.auto.conf still wins
# over it). Put machine-specific sizing here. Not in git.
include_if_exists = '/etc/postgresql/planet.local.conf'
